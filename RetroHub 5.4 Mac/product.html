<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroHub - Detail Produk & Lelang</title>
    <link rel="icon" href="/icons/icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Plus+Jakarta+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    
    <!-- Link Stylesheet Utama -->
    <link rel="stylesheet" href="styles.css">
    
    <style>
        /* Gaya Khusus Halaman Detail Produk */
        .product-detail-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            margin-top: 20px;
            background-color: var(--bg-card);
            border: 3px solid var(--retro-dark);
            box-shadow: 6px 6px 0px var(--retro-dark);
            border-radius: 8px;
            padding: 24px;
        }

        .product-gallery {
            width: 100%;
            border: 2px solid var(--retro-dark);
            border-radius: 6px;
            overflow: hidden;
            background-color: #F1F5F9;
            aspect-ratio: 1/1;
        }

        .product-gallery img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .product-info-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .product-meta-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-title-detail {
            font-family: var(--font-retro);
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--retro-dark);
            line-height: 1.2;
        }

        .seller-badge {
            font-size: 0.85rem;
            color: var(--mario-blue);
            font-weight: 700;
        }

        .price-section-box {
            background-color: #F8FAFC;
            border: 2px dashed var(--retro-dark);
            border-radius: 6px;
            padding: 16px;
        }

        .lelang-specs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 0.85rem;
        }

        .lelang-spec-item {
            background: #FFFFFF;
            border: 1.5px solid var(--retro-dark);
            padding: 6px 10px;
            border-radius: 4px;
        }

        .lelang-spec-label {
            font-size: 0.65rem;
            color: #64748B;
            font-weight: bold;
            text-transform: uppercase;
        }

        .lelang-spec-val {
            font-family: var(--font-number); /* Gunakan font angka bersih */
            font-size: 0.95rem;
            font-weight: bold;
        }

        /* Bid Action Form */
        .bid-action-form {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .bid-input {
            flex-grow: 1;
            border: 2px solid var(--retro-dark);
            border-radius: 4px;
            padding: 10px 12px;
            font-family: var(--font-number); /* Gunakan font angka bersih */
            font-size: 1.1rem;
            font-weight: bold;
            outline: none;
        }

        /* Pembelian Langsung & Keranjang Row */
        .purchase-action-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 12px;
        }

        .purchase-row {
            display: flex;
            gap: 10px;
        }

        .btn-retro {
            font-family: var(--font-retro);
            font-size: 0.95rem;
            font-weight: 700;
            color: #FFFFFF;
            border: 2px solid var(--retro-dark);
            border-radius: 4px;
            padding: 10px 20px;
            cursor: pointer;
            box-shadow: 2px 2px 0px var(--retro-dark);
            transition: transform 0.1s, box-shadow 0.1s;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .btn-retro:hover {
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0px var(--retro-dark);
        }

        .btn-retro:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px var(--retro-dark);
        }

        .btn-red { background-color: var(--mario-red); }
        .btn-blue { background-color: var(--mario-blue); }
        .btn-yellow { background-color: var(--mario-yellow); color: var(--retro-dark); }
        .btn-green { background-color: var(--mario-green); }
        .btn-white { background-color: #FFFFFF; color: var(--retro-dark); }

        /* Wishlist Box */
        .wishlist-status-box {
            font-size: 0.85rem;
            font-weight: bold;
            color: #64748B;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
        }

        /* Shipping Calculator Box */
        .shipping-calc-box {
            border: 2px solid var(--retro-dark);
            border-radius: 6px;
            padding: 16px;
            background-color: #FFFDF5;
        }

        .shipping-calc-title {
            font-family: var(--font-retro);
            font-size: 1rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .shipping-calc-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
        }

        .shipping-select {
            flex-grow: 1;
            border: 2px solid var(--retro-dark);
            border-radius: 4px;
            padding: 8px;
            font-family: var(--font-body);
            font-size: 0.85rem;
            outline: none;
            background-color: #FFFFFF;
        }

        .shipping-result {
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed var(--retro-dark);
        }

        .shipping-rate-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .shipping-rate-val {
            font-family: var(--font-number); /* Gunakan font angka bersih */
            font-weight: bold;
        }

        /* Bid History (Lelang History) */
        .bid-history-box {
            border: 2px solid var(--retro-dark);
            border-radius: 6px;
            padding: 16px;
            background-color: #FFFFFF;
            max-height: 200px;
            overflow-y: auto;
        }

        .bid-history-title {
            font-family: var(--font-retro);
            font-size: 1rem;
            margin-bottom: 12px;
        }

        .bid-history-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .bid-history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            padding-bottom: 6px;
            border-bottom: 1px dashed var(--retro-light-gray);
        }

        .bid-history-item:first-child {
            font-weight: bold;
            color: var(--mario-green);
            border-bottom: 1.5px solid var(--mario-green);
        }

        .bid-history-item span:first-child {
            font-family: var(--font-retro);
        }

        .bid-history-amount {
            font-family: var(--font-number); /* Angka bersih */
            font-weight: bold;
        }

        /* Back Button */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: var(--retro-dark);
            font-family: var(--font-retro);
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 16px;
            transition: color 0.1s;
        }

        .back-link:hover {
            color: var(--mario-red);
        }

        /* Login Selector Dropdown */
        .login-selector-container {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #FFFFFF;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .login-select {
            background-color: #FFFFFF;
            color: var(--retro-dark);
            border: 2px solid var(--retro-dark);
            border-radius: 4px;
            padding: 4px 6px;
            font-family: var(--font-retro);
            font-size: 0.75rem;
            font-weight: bold;
            outline: none;
            cursor: pointer;
        }

        .login-select:hover {
            background-color: var(--mario-yellow);
        }

        .cart-badge {
            background-color: var(--mario-yellow);
            color: var(--retro-dark);
            font-family: var(--font-number);
            font-size: 0.7rem;
            font-weight: bold;
            padding: 0 4px;
            border-radius: 3px;
            margin-left: 2px;
            border: 1px solid var(--retro-dark);
        }

        @media (max-width: 768px) {
            .product-detail-layout {
                grid-template-columns: 1fr;
                gap: 16px;
                padding: 14px;
                box-shadow: 3px 3px 0px var(--retro-dark);
                overflow: hidden;
            }
            .product-gallery {
                max-width: 100%;
            }
            .product-title-detail {
                font-size: 1.25rem;
            }
            .bid-action-form {
                flex-direction: column;
            }
            .bid-input {
                width: 100%;
                font-size: 1rem;
            }
            .purchase-row {
                flex-direction: column;
            }
            .shipping-calc-row {
                flex-direction: column;
                gap: 8px;
            }
            .shipping-select {
                width: 100%;
            }
            .lelang-specs {
                grid-template-columns: 1fr;
                gap: 8px;
            }
        }
        /* Mobile: sembunyikan label "Login:" di header product.html */
        @media (max-width: 480px) {
            .login-selector-container span {
                display: none;
            }
            .login-select {
                max-width: 90px;
                font-size: 0.62rem;
                padding: 3px;
            }
            .toolbar-btn-text {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <!-- Header Sempit Merah Mario -->
    <header>
        <div class="logo-container">
            <a href="index.html" class="logo-text">RetroHub</a>
        </div>
        <div class="header-toolbar">
            <!-- Selector Login Simulasi -->
            <div class="login-selector-container">
                <span>Login:</span>
                <select class="login-select" id="login-session-selector" onchange="toggleLoginSession(this.value)">
                    <option value="buyer-demo">Rian (Pembeli)</option>
                    <option value="guest">Guest (Belum Login)</option>
                </select>
            </div>
            
            <a href="seller.html" class="toolbar-btn-text" title="Dashboard Seller">SellerHub</a>
            <a href="#" class="toolbar-btn" title="Notifikasi">🔔</a>
            <a href="#" class="toolbar-btn" title="Keranjang">
                🛒<span class="cart-badge" id="cart-counter">0</span>
            </a>
            <a href="#" class="toolbar-btn" title="Pengaturan">⚙️</a>
            <a href="#" class="toolbar-btn" title="Akun">👤</a>
        </div>
    </header>

    <div class="container">
        
        <!-- Tombol Kembali -->
        <a href="index.html" class="back-link">⬅️ Kembali ke Beranda</a>

        <!-- Main Product Detail Box -->
        <div class="product-detail-layout" id="product-detail">
            <!-- Data akan di-load secara dinamis -->
        </div>

        <!-- Kolom Diskusi Produk -->
        <div id="discussion-container" class="discussion-container" style="margin-top: 24px; background-color: var(--bg-card); border: 3px solid var(--retro-dark); box-shadow: 4px 4px 0px var(--retro-dark); border-radius: 8px; padding: clamp(14px, 4vw, 24px); display: none; box-sizing: border-box; width: 100%; overflow-x: hidden;">
            <!-- Data diskusi dimuat secara dinamis -->
        </div>

        <!-- Kolom Ulasan Produk (Publik) -->
        <div id="reviews-section" style="margin-top: 20px; display: none;"></div>

    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-copyright">© 2026 RetroHub.</div>
        <a href="#" class="donation-btn">☕ Dukung RetroHub</a>
    </footer>

    <!-- Muat Database & UI Notification Simulasinya -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <script src="ui.js"></script>
    
    <script>
        // Ambil ID produk dari parameter URL (?id=prod-3)
        const urlParams = new URLSearchParams(window.location.search);
        let productId = urlParams.get('id') || 'prod-3';

        // Render header cart count
        function updateCartBadge() {
            const cart = db.getCart();
            const counter = document.getElementById('cart-counter');
            if (counter) {
                counter.innerText = cart.length;
            }
        }

        // Jalankan sinkronisasi login dropdown saat halaman dimuat
        function syncLoginDropdown() {
            const selector = document.getElementById('login-session-selector');
            const currentUserId = db.getCurrentUserId();
            if (selector) {
                selector.value = currentUserId ? 'buyer-demo' : 'guest';
            }
        }

        // Ubah Status Login Simulasi
        function toggleLoginSession(value) {
            db.setCurrentUserId(value);
            if (typeof updateChatBadgeGlobal === 'function') {
                updateChatBadgeGlobal();
            }
            syncLoginDropdown();
            renderProductDetail();
            
            if (value === 'guest') {
                showToast("Status: Guest", "Anda sekarang berselancar sebagai pengunjung anonim.", "info");
            } else {
                showToast("Status: Terautentikasi", "Anda login sebagai Rian (buyer-demo).", "success");
            }
        }

        const detailContainer = document.getElementById('product-detail');

        function renderProductDetail() {
            const product = db.getProductById(productId);
            if (!product) {
                detailContainer.innerHTML = `<h2>Produk tidak ditemukan!</h2>`;
                return;
            }

            const currentUserId = db.getCurrentUserId();
            const isAuction = product.transaction_type === 'lelang';
            let bids = [];
            let currentPriceText = '';
            let currentPriceVal = 0;

            const hasDiscount = product.discount_percent && product.discount_percent > 0;
            const discountedPrice = hasDiscount ? product.price - (product.price * product.discount_percent / 100) : product.price;

            if (isAuction) {
                bids = db.getBidsByProductId(product.id);
                currentPriceVal = bids.length > 0 ? bids[0].amount : product.starting_bid;
                currentPriceText = `Rp${currentPriceVal.toLocaleString('id-ID')}`;
            } else {
                currentPriceVal = discountedPrice;
                currentPriceText = `Rp${discountedPrice.toLocaleString('id-ID')}`;
            }

            // Stok yang tersedia untuk dibeli (hanya jika produk masih 'active')
            const availableStock = (product.status === 'active') ? (Number(product.stock) >= 0 ? Number(product.stock) : 1) : 0;

            const isLiked = currentUserId ? db.isWishlisted(product.id, currentUserId) : false;
            const cart = db.getCart();
            const isInCart = cart.includes(product.id);

            // Membangun tampilan Detail Produk
            let htmlContent = `
                <!-- 1. Galeri Gambar (Kiri) -->
                <div class="product-gallery-container" style="display: flex; flex-direction: column; gap: 12px; width: 100%;">
                    <div class="product-gallery" style="position: relative;">
                        <!-- Tombol Slide Back & Next -->
                        ${(product.image_urls && product.image_urls.length > 1) ? `
                            <button type="button" onclick="moveGallerySlide(-1)" style="position: absolute; top: 50%; left: 10px; transform: translateY(-50%); background-color: rgba(255,255,255,0.85); border: 2px solid var(--retro-dark); border-radius: 4px; box-shadow: 1.5px 1.5px 0px var(--retro-dark); width: 28px; height: 28px; display: flex; justify-content: center; align-items: center; font-size: 0.75rem; font-weight: bold; cursor: pointer; z-index: 10;" onmouseover="this.style.backgroundColor='var(--mario-yellow)'" onmouseout="this.style.backgroundColor='rgba(255,255,255,0.85)'">◀</button>
                            <button type="button" onclick="moveGallerySlide(1)" style="position: absolute; top: 50%; right: 10px; transform: translateY(-50%); background-color: rgba(255,255,255,0.85); border: 2px solid var(--retro-dark); border-radius: 4px; box-shadow: 1.5px 1.5px 0px var(--retro-dark); width: 28px; height: 28px; display: flex; justify-content: center; align-items: center; font-size: 0.75rem; font-weight: bold; cursor: pointer; z-index: 10;" onmouseover="this.style.backgroundColor='var(--mario-yellow)'" onmouseout="this.style.backgroundColor='rgba(255,255,255,0.85)'">▶</button>
                        ` : ''}
                        
                        <img id="main-product-image" src="${product.image_url}" alt="${product.title}" style="cursor: zoom-in;" onclick="openImageLightbox(this.src)">
                    </div>
                    
                    <!-- Thumbnails row -->
                    ${(product.image_urls && product.image_urls.length > 1) ? `
                        <div class="product-thumbnails" style="display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; scrollbar-width: thin;">
                            ${product.image_urls.map((img, idx) => `
                                <div class="thumbnail-wrapper" onclick="changeProductImage(this, '${img}')" style="flex: 0 0 60px; height: 60px; border: ${idx === 0 ? '3px solid var(--mario-yellow)' : '2px solid var(--retro-dark)'}; border-radius: 4px; box-shadow: ${idx === 0 ? '2px 2px 0px var(--mario-red)' : '1px 1px 0px var(--retro-dark)'}; overflow: hidden; cursor: pointer; transition: all 0.1s;">
                                    <img src="${img}" style="width: 100%; height: 100%; object-fit: cover;">
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                </div>

                <!-- 2. Detail Panel Informasi (Kanan) -->
                <div class="product-info-panel">
                    
                    <div class="product-meta-header">
                        <div class="tags-row">
                            <span class="tag ${product.condition.toLowerCase()}">${product.condition}</span>
                            <span class="tag" style="border-color: var(--mario-blue); color: var(--mario-blue); font-weight: bold;">
                                ${isAuction ? '🔨 LELANG' : '📦 SALE'}
                            </span>
                        </div>
                        <span class="seller-badge">Seller: <a href="store.html?seller_id=${product.seller_id}" style="color: var(--mario-blue); font-weight: bold; text-decoration: underline;">${product.seller_name}</a> (${product.seller_kecamatan})</span>
                    </div>

                    <h1 class="product-title-detail">${product.title}</h1>
                    
                    <!-- Wishlist Status (Jumlah Suka) -->
                    <div class="wishlist-status-box">
                        <span>❤️ ${product.wishlist_count || 0} orang menyukai ini</span>
                    </div>

                    <p style="font-size: 0.85rem; color: #475569; border-bottom: 1px solid var(--retro-light-gray); padding-bottom: 12px;">
                        ${product.description}
                    </p>

                    <!-- Harga & Aksi Bidding / Pembelian -->
                    <div class="price-section-box">
            `;

            if (isAuction) {
                htmlContent += `
                        <div class="lelang-specs">
                            <div class="lelang-spec-item">
                                <span class="lelang-spec-label">Bid Terkini</span>
                                <span class="lelang-spec-val" style="color: var(--mario-red);" id="ui-current-price">${currentPriceText}</span>
                            </div>
                            <div class="lelang-spec-item">
                                <span class="lelang-spec-label">Sisa Waktu</span>
                                <span class="lelang-spec-val" style="color: var(--mario-red); font-family: var(--font-number);" id="ui-countdown">⏳ --:--:--</span>
                            </div>
                            <div class="lelang-spec-item">
                                <span class="lelang-spec-label">Buyout (Beli Instan)</span>
                                <span class="lelang-spec-val" style="color: var(--mario-blue);">Rp${product.buyout_price.toLocaleString('id-ID')}</span>
                            </div>
                            <div class="lelang-spec-item">
                                <span class="lelang-spec-label">Minimal Kelipatan</span>
                                <span class="lelang-spec-val">Rp${product.bid_increment.toLocaleString('id-ID')}</span>
                            </div>
                        </div>

                        <!-- Form Mengirimkan Bid Baru -->
                        <div class="bid-action-form" style="display: flex; flex-direction: column; gap: 8px; width: 100%;">
                            <input type="text" class="bid-input" id="input-bid" 
                                   value="Rp ${(currentPriceVal + product.bid_increment).toLocaleString('id-ID')}" 
                                   oninput="formatBidInput(this)" style="font-family: var(--font-number); font-weight: bold; width: 100%;">
                            <div style="display: flex; gap: 8px; width: 100%; flex-wrap: wrap;">
                                <button class="btn-retro btn-red" onclick="handlePlaceBid()" style="flex: 1 1 auto; min-width: 60px;">Bid</button>
                                <button class="btn-retro btn-blue" onclick="handleBuyout()" style="flex: 1 1 auto; min-width: 90px;">Buyout</button>
                                <button class="btn-retro btn-yellow" onclick="handleStartPrivateChat()" title="Chat Penjual" style="flex: 1 1 auto; min-width: 80px;">💬 Chat</button>
                                <button class="btn-retro ${isLiked ? 'btn-red' : 'btn-white'}" onclick="handleWishlist()" title="Wishlist" style="padding: 10px 14px;">
                                    ${isLiked ? '❤️' : '🤍'}
                                </button>
                                <button class="btn-retro btn-green" onclick="handleShareLink()" title="Bagikan Produk" style="padding: 10px 14px;">🔗 Share</button>
                            </div>
                        </div>
                `;
            } else {
                const discountInfo = hasDiscount ? `
                    <span style="background-color: var(--mario-yellow); color: var(--retro-dark); padding: 2px 6px; border: 1.5px solid var(--retro-dark); border-radius: 4px; font-family: var(--font-retro); font-size: 0.75rem; font-weight: bold; margin-left: 8px;">
                        -${product.discount_percent}% PROMO
                    </span>` : '';
                
                const slashedPrice = hasDiscount ? `
                    <div style="font-size: 0.8rem; text-decoration: line-through; color: #64748B; font-family: var(--font-number); margin-top: 4px;">
                        Rp${product.price.toLocaleString('id-ID')}
                    </div>` : '';

                htmlContent += `
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                            <div>
                                <div style="display: flex; align-items: center;">
                                    <span style="font-size: 0.7rem; color: #64748B; font-weight: bold; text-transform: uppercase;">Harga Pas</span>
                                    ${discountInfo}
                                </div>
                                <h2 style="font-family: var(--font-number); color: var(--mario-red); font-size: 1.6rem; line-height: 1.1;">
                                    ${currentPriceText}
                                </h2>
                                ${slashedPrice}
                            </div>
                            <span style="font-size: 0.85rem; color: #64748B; font-weight: 600;">Stok Tersedia: ${availableStock}</span>
                        </div>

                        ${availableStock <= 0 ? `
                        <!-- Stok Habis -->
                        <div class="purchase-action-form">
                            <div style="background:#FEF2F2;border:2px dashed var(--mario-red);border-radius:6px;padding:12px;text-align:center;font-weight:bold;color:#DC2626;">
                                😢 Stok Habis
                            </div>
                            <div class="purchase-row">
                                <button class="btn-retro btn-yellow" onclick="handleStartPrivateChat()" title="Chat Penjual" style="flex-grow:1;">💬 Chat Penjual</button>
                                <button class="btn-retro ${isLiked ? 'btn-red' : 'btn-white'}" onclick="handleWishlist()">
                                    ${isLiked ? '❤️' : '🤍'}
                                </button>
                            </div>
                        </div>
                        ` : `
                        <!-- Panel Aksi Produk Beli Langsung (Sale) -->

        // Fungsi Render Riwayat Penawaran Lelang
        function renderBids(bidsList) {
            const historyListUI = document.getElementById('ui-bid-history');
            if (!historyListUI) return;

            if (bidsList.length === 0) {
                historyListUI.innerHTML = `<li style="font-size: 0.8rem; color: #64748B; text-align: center;">Belum ada penawaran. Jadilah yang pertama!</li>`;
                return;
            }

            historyListUI.innerHTML = bidsList.map((bid, index) => {
                const date = new Date(bid.created_at);
                const timeStr = `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
                return `
                    <li class="bid-history-item">
                        <span>${bid.bidder_name} ${index === 0 ? '👑' : ''}</span>
                        <span class="bid-history-amount">Rp${bid.amount.toLocaleString('id-ID')} (${timeStr})</span>
                    </li>
                `;
            }).join('');
        }

        // Fungsi Hitung Mundur Waktu Lelang
        function startCountdown(endTimeStr) {
            const countdownUI = document.getElementById('ui-countdown');
            if (!countdownUI) return;

            const endTime = new Date(endTimeStr).getTime();

            const interval = setInterval(() => {
                const now = new Date().getTime();
                const distance = endTime - now;

                if (distance < 0) {
                    clearInterval(interval);
                    countdownUI.innerHTML = "LELANG BERAKHIR";
                    countdownUI.style.color = "var(--retro-dark)";
                    return;
                }

                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                countdownUI.innerHTML = `⏳ ${hours.toString().padStart(2,'0')}j:${minutes.toString().padStart(2,'0')}m:${seconds.toString().padStart(2,'0')}d`;
                
                if (distance < 60 * 60 * 1000) {
                    countdownUI.style.color = "var(--mario-red)";
                } else {
                    countdownUI.style.color = "var(--mario-green)";
                }
            }, 1000);
        }

        // Fungsi Kalkulasi Estimasi Ongkir dengan Data Asli lookup db.js
        function initShippingCalculator(weightGrams, originKec) {
            const ratesUI = document.getElementById('shipping-rates-ui');
            const locationInfo = document.getElementById('shipping-location-info');
            if (!ratesUI) return;

            // Baca lokasi dari pengaturan header (tombol lokasi di navbar)
            const loc = db.getUserLocation ? db.getUserLocation() : null;

            if (!loc || !loc.kecamatan) {
                // Belum diatur lokasi di header
                if (locationInfo) {
                    locationInfo.innerHTML = `<div style="background:#FEF3C7;border:1.5px dashed #F59E0B;border-radius:4px;padding:8px 10px;font-size:0.72rem;color:#92400E;">
                        📍 Isi lokasi di atas (tombol lokasi di header) untuk estimasi biaya pengiriman.
                        <a href="#" onclick="if(window.openLocationModal)openLocationModal();return false;" style="color:var(--mario-blue);font-weight:bold;text-decoration:underline;margin-left:4px;">Atur Sekarang</a>
                    </div>`;
                }
                ratesUI.innerHTML = '';
                return;
            }

            // Lokasi sudah diatur — tampilkan info dan hitung tarif
            const destKec = loc.kecamatan;
            const destKota = loc.kota || '';
            const destProv = loc.provinsi || '';

            if (locationInfo) {
                locationInfo.innerHTML = `<div style="font-size:0.72rem;color:#374151;">
                    📍 Tujuan: <strong>${destKec}${destKota ? ', ' + destKota : ''}${destProv ? ', ' + destProv : ''}</strong>
                    <a href="#" onclick="if(window.openLocationModal)openLocationModal();return false;" style="color:var(--mario-blue);font-size:0.65rem;margin-left:6px;text-decoration:underline;">Ubah</a>
                </div>`;
            }

            const product = db.getProductById(urlParams.get('id'));
            const seller = product ? db.getProfileById(product.seller_id) : null;
            const originInfo = seller ? {
                provinsi: seller.address_provinsi || '',
                kota: seller.address_kota || '',
                kecamatan: originKec || '',
                lat: seller.address_lat,
                lng: seller.address_lng
            } : { provinsi: '', kota: '', kecamatan: originKec || '' };
            const destInfo = { provinsi: destProv, kota: destKota, kecamatan: destKec };

            const jntRate = db.getRealShippingRate(originKec, destKec, weightGrams, 'jnt', originInfo, destInfo);
            const posRate = db.getRealShippingRate(originKec, destKec, weightGrams, 'pos', originInfo, destInfo);

            ratesUI.innerHTML = `
                <div class="shipping-rate-item">
                    <span>🔴 J&T Express (Regular)</span>
                    <span class="shipping-rate-val">Rp${jntRate.toLocaleString('id-ID')}</span>
                </div>
                <div class="shipping-rate-item">
                    <span>🟢 Pos Indonesia (Kilat Khusus)</span>
                    <span class="shipping-rate-val">Rp${posRate.toLocaleString('id-ID')}</span>
                </div>
                <p style="font-size: 0.65rem; color: #64748B; margin-top: 6px;">*Tarif estimasi berdasarkan berat produk (${weightGrams} gram) dan tarif antar wilayah J&T/Pos Indonesia.</p>
            `;
        }

        // Proteksi Fitur Login dengan Retro Alert
        function verifyLogin() {
            const currentUserId = db.getCurrentUserId();
            if (!currentUserId) {
                showAlert("Akses Ditolak ⚠️", "Anda wajib Login menggunakan Akun Google terlebih dahulu untuk membeli, ngebid, atau menggunakan wishlist.");
                return false;
            }
            const user = db.getProfileById(currentUserId);
            if (user && user.penalty_points && user.penalty_points >= 6) {
                showAlert("Akun Ditangguhkan ⚠️", "Akun Anda ditangguhkan karena poin penalti telah mencapai batas maksimal (6/6 Poin). Anda tidak dapat melakukan transaksi atau menawar barang.");
                return false;
            }
            return currentUserId;
        }

        // Proteksi agar penjual tidak membeli barangnya sendiri
        function verifyNotOwner(product, userId) {
            if (product.seller_id === userId) {
                showAlert("Akses Ditolak ⚠️", "Anda tidak diperbolehkan membeli, menawar (bid), buyout, atau memasukkan produk milik Anda sendiri ke keranjang belanja!");
                return false;
            }

            // Proteksi Kemiripan Data (Collision Detector)
            const buyer = db.getProfileById(userId);
            const seller = db.getProfileById(product.seller_id);
            if (buyer && seller) {
                const isPhoneSame = buyer.phone_number && seller.whatsapp && buyer.phone_number.trim() === seller.whatsapp.trim();
                const isWASame = buyer.whatsapp && seller.whatsapp && buyer.whatsapp.trim() === seller.whatsapp.trim();
                const isBankSame = buyer.bank_account && seller.bank_account && buyer.bank_account.trim() === seller.bank_account.trim();
                const isLocationSame = buyer.address_lat && seller.address_lat &&
                    Math.abs(Number(buyer.address_lat) - Number(seller.address_lat)) < 0.0005 &&
                    Math.abs(Number(buyer.address_lng) - Number(seller.address_lng)) < 0.0005;

                if (isPhoneSame || isWASame || isBankSame || isLocationSame) {
                    showAlert("Indikasi Transaksi Fiktif ⚠️", "Sistem mendeteksi kemiripan data alamat, WhatsApp, atau nomor rekening Anda dengan Seller. Aksi dibatalkan untuk mencegah manipulasi rating.");
                    return false;
                }
            }
            return true;
        }

        // Aksi Masuk Keranjang (Hanya jika Login)
        function handleAddToCart() {
            const userId = verifyLogin();
            if (!userId) return;

            const product = db.getProductById(productId);
            if (!product || !verifyNotOwner(product, userId)) return;

            // Ambil jumlah (quantity) yang dipilih buyer
            const qtyInput = document.getElementById('purchase-qty');
            const availableStock = (product.status === 'active') ? (Number(product.stock) >= 0 ? Number(product.stock) : 1) : 0;
            let quantity = qtyInput ? (parseInt(qtyInput.value, 10) || 1) : 1;
            quantity = Math.min(Math.max(1, quantity), Math.max(1, availableStock));

            const success = db.addToCart(productId, quantity);
            if (success) {
                showToast("Masuk Keranjang 📥", "Produk berhasil ditambahkan ke keranjang belanja!", "success");
                renderProductDetail();
            }
        }

        // Aksi Tombol Bid (Hanya jika Login)
        function handlePlaceBid() {
            const userId = verifyLogin();
            if (!userId) return;

            const product = db.getProductById(productId);
            const inputBid = document.getElementById('input-bid');
            if (!product || !inputBid || !verifyNotOwner(product, userId)) return;

            const bidAmount = parseFloat(inputBid.value.replace(/[^0-9]/g, ''));
            const bids = db.getBidsByProductId(product.id);
            const currentHighest = bids.length > 0 ? bids[0].amount : product.starting_bid;
            const minAllowed = currentHighest + product.bid_increment;

            if (isNaN(bidAmount) || bidAmount < minAllowed) {
                showAlert("Nominal Bid Tidak Valid ❌", `Kenaikan bid Anda tidak sesuai kelipatan. Minimal penawaran baru adalah Rp${minAllowed.toLocaleString('id-ID')}`);
                return;
            }

            const executeBidPlacement = () => {
                // Check if bid touches or exceeds buyout price
                if (product.buyout_price && bidAmount >= product.buyout_price) {
                    showToast("Bid Menyentuh Buyout 🚀", "Nominal bid menyentuh harga Buyout! Pembelian lelang otomatis diselesaikan.", "success");
                    
                    const _loc1 = db.getUserLocation ? db.getUserLocation() : null;
                    const shippingCost = _loc1 ? db.getRealShippingRate(product.seller_kecamatan, _loc1.kecamatan, product.weight_grams || 250, 'jnt') : 19000;
                    const adminFee = 5000;
                    const totalPayment = product.buyout_price + shippingCost + adminFee;

                    const newOrder = db.createOrder({
                        product_id: product.id,
                        buyer_id: userId,
                        seller_id: product.seller_id,
                        price_deal: product.buyout_price,
                        shipping_cost: shippingCost,
                        admin_fee: adminFee,
                        total_payment: totalPayment,
                        shipping_courier: 'JNT',
                        status: 'waiting_payment'
                    });

                    
                    const buyer = db.getProfileById(userId);
                    const buyerName = buyer ? buyer.store_name : 'pembeli';
                    db.sendPrivateChat('admin-demo', product.seller_id, `Kabar baik! Mainan lelang Anda "${product.title}" telah dimenangkan secara otomatis via Bid menyentuh Buyout oleh @${buyerName}. Menunggu pembayaran rekber.`);

                    // Refresh detail produk
                    renderProductDetail();

                    // Tampilkan modal pembayaran
                    const mockGroups = { [product.seller_id]: { sellerName: product.seller_name, subtotal: product.buyout_price, shippingCost } };
                    openCheckoutModal([newOrder.id], product.buyout_price, shippingCost, adminFee, buyer, mockGroups, [product.seller_id], product.seller_kecamatan, product.weight_grams || 250);
                    return;
                }

                // Kirim bid ke database lokal (db.js)
                const successfulBid = db.placeBid(product.id, userId, bidAmount);
                if (successfulBid) {
                    showToast("Bid Berhasil 🔨", `Anda memimpin penawaran lelang sebesar Rp${bidAmount.toLocaleString('id-ID')}`, "success");
                    renderProductDetail();
                }
            };

            // Check if user is already leading the bid
            if (bids.length > 0 && bids[0].bidder_id === userId) {
                showConfirm(
                    "Konfirmasi Kenaikan Bid 🔨",
                    `Anda saat ini sudah memimpin penawaran teratas. Apakah Anda yakin ingin menaikkan penawaran Anda sendiri menjadi Rp${bidAmount.toLocaleString('id-ID')}?`,
                    () => {
                        executeBidPlacement();
                    }
                );
            } else {
                executeBidPlacement();
            }
        }

        // Aksi Tombol Beli Langsung (Hanya jika Login)
        function changePurchaseQty(delta) {
            const input = document.getElementById('purchase-qty');
            if (!input) return;
            const max = Number(input.max) || 1;
            let val = (parseInt(input.value, 10) || 1) + delta;
            val = Math.min(max, Math.max(1, val));
            input.value = val;
        }

        function handleDirectPurchase() {
            const userId = verifyLogin();
            if (!userId) return;

            const product = db.getProductById(productId);
            if (!product || !verifyNotOwner(product, userId)) return;

            const hasDiscount = product.discount_percent && product.discount_percent > 0;
            const discountedPrice = hasDiscount ? product.price - (product.price * product.discount_percent / 100) : product.price;

            // Ambil jumlah (quantity) yang dipilih buyer
            const qtyInput = document.getElementById('purchase-qty');
            const availableStock = (product.status === 'active') ? (Number(product.stock) >= 0 ? Number(product.stock) : 1) : 0;
            let quantity = qtyInput ? (parseInt(qtyInput.value, 10) || 1) : 1;
            quantity = Math.min(Math.max(1, quantity), Math.max(1, availableStock));

            if (availableStock <= 0) {
                showAlert('Stok Habis 😢', 'Maaf, stok produk ini sudah habis.');
                return;
            }

            const subtotal = discountedPrice * quantity;
            const _locBuy = db.getUserLocation ? db.getUserLocation() : null;
            const courier = 'jnt';
            const shippingCost = _locBuy ? db.getRealShippingRate(product.seller_kecamatan, _locBuy.kecamatan, product.weight_grams * quantity, courier) : 15000;
            const adminFee = 5000;
            const totalPayment = subtotal + shippingCost + adminFee;

            showConfirm(
                "Konfirmasi Beli 🛒", 
                `Apakah Anda yakin ingin membeli "${product.title}" x${quantity} seharga Rp${subtotal.toLocaleString('id-ID')}?\nOngkir: Rp${shippingCost.toLocaleString('id-ID')} | Biaya Admin: Rp${adminFee.toLocaleString('id-ID')}\nTotal: Rp${totalPayment.toLocaleString('id-ID')}`, 
                () => {
                    const newOrder = db.createOrder({
                        product_id: product.id,
                        buyer_id: userId,
                        seller_id: product.seller_id,
                        price_deal: subtotal,
                        quantity: quantity,
                        shipping_cost: shippingCost,
                        admin_fee: adminFee,
                        total_payment: totalPayment,
                        shipping_courier: 'JNT',
                        status: 'waiting_payment'
                    });

                    
                    const buyer = db.getProfileById(userId);
                    const buyerName = buyer ? buyer.store_name : 'pembeli';
                    db.sendPrivateChat('admin-demo', product.seller_id, `Kabar baik! Mainan Anda "${product.title}" (x${quantity}) telah dibeli oleh @${buyerName}. Menunggu pembayaran rekber.`);

                    // Tampilkan modal pembayaran
                    const mockGroups = { [product.seller_id]: { sellerName: product.seller_name, subtotal: subtotal, shippingCost } };
                    openCheckoutModal([newOrder.id], subtotal, shippingCost, adminFee, buyer, mockGroups, [product.seller_id], product.seller_kecamatan, (product.weight_grams || 250) * quantity);
                }
            );
        }

        function handleStartPrivateChat() {

            if (product.seller_id === userId) {
                showAlert("Aksi Ditolak ⚠️", "Anda tidak dapat memulai obrolan privat dengan toko Anda sendiri!");

                `Harga     : ${priceStr}\n` +

            const product = db.getProductById(productId);
            if (!product || !product.image_urls || product.image_urls.length <= 1) return;

            currentGalleryIndex += direction;
            if (currentGalleryIndex < 0) {
                currentGalleryIndex = product.image_urls.length - 1;
            } else if (currentGalleryIndex >= product.image_urls.length) {
                currentGalleryIndex = 0;
            }

            const activeImg = product.image_urls[currentGalleryIndex];
            
            const mainImg = document.getElementById('main-product-image');
            if (mainImg) {
                mainImg.src = activeImg;
            }

            const thumbnails = document.querySelectorAll('.thumbnail-wrapper');
            thumbnails.forEach((thumb, idx) => {
                if (idx === currentGalleryIndex) {
                    thumb.style.border = '3px solid var(--mario-yellow)';
                    thumb.style.boxShadow = '2px 2px 0px var(--mario-red)';
                } else {
                    thumb.style.border = '2px solid var(--retro-dark)';
                    thumb.style.boxShadow = '1px 1px 0px var(--retro-dark)';
                }
            });
        }

        function openImageLightbox(src) {
            let overlay = document.getElementById('image-lightbox-overlay');
            if (overlay) return;

            overlay = document.createElement('div');
            overlay.id = 'image-lightbox-overlay';
            overlay.style.position = 'fixed';
            overlay.style.top = '0';
            overlay.style.left = '0';
            overlay.style.width = '100%';
            overlay.style.height = '100%';
            overlay.style.backgroundColor = 'rgba(26,26,26,0.9)';
            overlay.style.backdropFilter = 'blur(4px)';
            overlay.style.zIndex = '100000';
            overlay.style.display = 'flex';
            overlay.style.justifyContent = 'center';
            overlay.style.alignItems = 'center';

            overlay.innerHTML = `
                <div style="position: relative; max-width: 90vw; max-height: 90vh; display: flex; justify-content: center; align-items: center;">
                    <img src="${src}" style="max-width: 90vw; max-height: 85vh; object-fit: contain; border: 4px solid var(--retro-dark); border-radius: 6px; box-shadow: 8px 8px 0px var(--retro-dark);">
                    <button onclick="document.getElementById('image-lightbox-overlay').remove()" style="position: absolute; top: -20px; right: -20px; background-color: var(--mario-red); color: white; border: 2.5px solid var(--retro-dark); border-radius: 50%; width: 32px; height: 32px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 2px 2px 0px var(--retro-dark); z-index: 100001; font-size: 0.9rem;">✖</button>
                </div>
            `;

            document.body.appendChild(overlay);

            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.remove();
                }
            });
        }

        function formatBidInput(input) {
            let value = input.value.replace(/[^0-9]/g, '');
            if (value === '') {
                input.value = '';
                return;
            }
            let formatted = parseFloat(value).toLocaleString('id-ID');
            input.value = 'Rp ' + formatted;
        }

        // ---- Render Review Publik ----
        function renderReviewsSection(productId) {
            const reviewsEl = document.getElementById('reviews-section');
            if (!reviewsEl) return;

            const reviews = db.getReviewsByProductId(productId);
            const product = db.getProductById(productId);
            const seller = product ? db.getProfileById(product.seller_id) : null;

            // Hitung distribusi bintang
            const dist = [0,0,0,0,0];
            reviews.forEach(r => { if (r.rating >= 1 && r.rating <= 5) dist[r.rating-1]++; });
            const total = reviews.length;
            const avgRating = total > 0 ? (reviews.reduce((s,r) => s+r.rating, 0) / total) : 0;
            const stars = n => '⭐'.repeat(Math.round(n)) + '☆'.repeat(5-Math.round(n));

            // Rating bar
            const ratingBars = [5,4,3,2,1].map(n => {
                const count = dist[n-1];
                const pct = total > 0 ? Math.round(count/total*100) : 0;
                return `<div style="display:flex;align-items:center;gap:6px;font-size:0.68rem;">
                    <span style="width:28px;color:#64748B;">${n}⭐</span>
                    <div style="flex:1;height:8px;background:#E2E8F0;border-radius:4px;overflow:hidden;">
                        <div style="width:${pct}%;height:100%;background:var(--mario-yellow);border-radius:4px;transition:width 0.4s;"></div>
                    </div>
                    <span style="width:24px;color:#64748B;">${count}</span>
                </div>`;
            }).join('');

            const sellerRatingLine = seller
                ? `<a href="reviews.html?seller_id=${product.seller_id}" style="color:var(--mario-blue);text-decoration:none;font-weight:600;display:inline-flex;align-items:center;gap:4px;">🏪 ${seller.store_name} — ${seller.rating ? seller.rating + '⭐' : 'Belum ada ulasan'} &nbsp;(Lihat semua ulasan toko →)</a>`
                : '';

            // Preview 3 review, sisanya lihat di reviews.html
            const PREVIEW_MAX = 3;

            let reviewCards = '';
            if (total === 0) {
                reviewCards = `<div style="text-align:center;color:#64748B;font-size:0.8rem;padding:20px;border:2px dashed var(--retro-dark);border-radius:6px;">Belum ada ulasan untuk produk ini.</div>`;
            } else {
                reviewCards = reviews.slice().sort((a,b) => new Date(b.created_at)-new Date(a.created_at)).slice(0, PREVIEW_MAX).map(rev => {
                    const reviewer = db.getProfileById(rev.buyer_id);
                    const dateStr = new Date(rev.created_at).toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' });
                    const starDisplay = '⭐'.repeat(rev.rating) + '☆'.repeat(5-rev.rating);
                    const photoHTML = rev.photo_url ? `<img src="${rev.photo_url}" style="width:72px;height:72px;object-fit:cover;border-radius:6px;border:2px solid var(--retro-dark);margin-top:6px;">` : '';
                    return `
                        <div style="background:#FFFDF5;border:1.5px solid #E2E8F0;border-radius:6px;padding:10px;margin-bottom:8px;">
                            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">
                                <div>
                                    <span style="font-size:0.78rem;font-weight:bold;">@${reviewer ? reviewer.store_name : 'user'}</span>
                                    <span style="font-size:0.72rem;margin-left:6px;">${starDisplay}</span>
                                </div>
                                <span style="font-size:0.62rem;color:#94A3B8;">${dateStr}</span>
                            </div>
                            <div style="font-size:0.75rem;color:#374151;line-height:1.4;">${rev.text}</div>
                            ${photoHTML}
                        </div>`;
                }).join('');
                if (total > PREVIEW_MAX) {
                    reviewCards += `<a href="reviews.html?seller_id=${product.seller_id}" class="btn-retro btn-blue" style="display:block;text-align:center;font-size:0.75rem;padding:8px;margin-top:4px;text-decoration:none;">Lihat Semua ${total} Ulasan →</a>`;
                }
            }

            reviewsEl.style.display = 'block';
            reviewsEl.innerHTML = `
                <div style="background:var(--bg-card);border:3px solid var(--retro-dark);box-shadow:4px 4px 0px var(--retro-dark);border-radius:8px;padding:clamp(14px,4vw,24px);box-sizing:border-box;width:100%;">
                    <h3 style="font-family:var(--font-retro);font-size:1.1rem;margin-bottom:12px;border-bottom:3px dashed var(--retro-light-gray);padding-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;">
                        <span>⭐ Ulasan Pembeli (${total})</span>
                        ${total > 0 ? `<a href="reviews.html?seller_id=${product.seller_id}" style="font-size:0.65rem;font-family:var(--font-body);font-weight:600;color:var(--mario-blue);text-decoration:none;">Lihat Semua →</a>` : ''}
                    </h3>
                    ${total > 0 ? `
                    <div style="display:flex;gap:16px;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap;">
                        <div style="text-align:center;min-width:70px;">
                            <div style="font-size:2rem;font-weight:bold;color:var(--mario-yellow);font-family:var(--font-retro);">${avgRating.toFixed(1)}</div>
                            <div style="font-size:0.75rem;">${stars(avgRating)}</div>
                            <div style="font-size:0.62rem;color:#64748B;margin-top:2px;">${total} ulasan</div>
                        </div>
                        <div style="flex:1;min-width:120px;">${ratingBars}</div>
                    </div>` : ''}
                    ${sellerRatingLine ? `<div style="font-size:0.65rem;color:#64748B;margin-bottom:10px;background:#F8FAFC;border-radius:4px;padding:5px;">${sellerRatingLine}</div>` : ''}
                    ${reviewCards}
                </div>
            `;
        }

        function renderDiscussions() {
            const discContainer = document.getElementById('discussion-container');
            if (!discContainer) return;
            
            discContainer.style.display = 'block';

            const product = db.getProductById(productId);
            if (!product) return;

            const currentUserId = db.getCurrentUserId();
            const discussions = db.getDiscussionsByProductId(product.id);
            const isSeller = currentUserId === product.seller_id;

            let html = `
                <h3 style="font-family: var(--font-retro); font-size: 1.3rem; margin-bottom: 16px; border-bottom: 3px dashed var(--retro-light-gray); padding-bottom: 8px; display: flex; align-items: center; gap: 8px;">
                    💬 Diskusi Mainan (${discussions.length})
                </h3>
            `;

            if (discussions.length === 0) {
                html += `
                    <p style="text-align: center; color: #64748B; font-size: 0.85rem; padding: 20px; border: 2px dashed var(--retro-dark); border-radius: 6px; background-color: #F8FAFC; margin-bottom: 20px;">
                        Belum ada diskusi untuk produk ini. Jadilah yang pertama bertanya!
                    </p>
                `;
            } else {
                html += `<div style="display: flex; flex-direction: column; gap: 20px; margin-bottom: 24px;">`;
                
                discussions.forEach(disc => {
                    const date = new Date(disc.created_at);
                    const formattedDate = `${date.toLocaleDateString('id-ID')} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
                    
                    html += `
                        <!-- Pertanyaan Buyer -->
                        <div style="border: 2px solid var(--retro-dark); border-radius: 6px; box-shadow: 3px 3px 0px var(--retro-dark); background-color: #FFFDF0; padding: 14px; position: relative;">
                            <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; font-weight: bold; margin-bottom: 6px; color: #475569; border-bottom: 1px dashed var(--retro-light-gray); padding-bottom: 4px;">
                                <span>👤 @${disc.user_name} <span style="font-weight: normal; color: #94A3B8; margin-left: 6px;">${formattedDate}</span></span>
                            </div>
                            <p style="font-size: 0.85rem; color: var(--retro-dark); font-weight: 500; line-height: 1.4; white-space: pre-line;">${disc.message}</p>
                            
                            <!-- Daftar Balasan -->
                            ${disc.replies && disc.replies.length > 0 ? `
                                <div style="margin-top: 12px; display: flex; flex-direction: column; gap: 10px; padding-left: 16px; border-left: 3px dashed var(--mario-blue);">
                                    ${disc.replies.map(rep => {
                                        const rDate = new Date(rep.created_at);
                                        const rFormattedDate = `${rDate.toLocaleDateString('id-ID')} ${rDate.getHours().toString().padStart(2,'0')}:${rDate.getMinutes().toString().padStart(2,'0')}`;
                                        const isReplierSeller = rep.user_id === product.seller_id;
                                        const badgeText = isReplierSeller ? `<span style="background-color: var(--mario-green); color: white; font-family: var(--font-retro); font-size: 0.6rem; padding: 1px 4px; border: 1px solid var(--retro-dark); border-radius: 3px; margin-left: 4px; box-shadow: 1px 1px 0px var(--retro-dark);">SELLER</span>` : '';
                                        const replyBg = isReplierSeller ? '#F0FDF4' : '#F0F9FF';
                                        
                                        return `
                                            <div style="border: 1.5px solid var(--retro-dark); border-radius: 4px; box-shadow: 2px 2px 0px var(--retro-dark); background-color: ${replyBg}; padding: 10px;">
                                                <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.7rem; font-weight: bold; margin-bottom: 4px; color: #475569;">
                                                    <span>👤 @${rep.user_name} ${badgeText}</span>
                                                    <span style="font-weight: normal; color: #94A3B8;">${rFormattedDate}</span>
                                                </div>
                                                <p style="font-size: 0.8rem; color: var(--retro-dark); line-height: 1.4; white-space: pre-line;">${rep.message}</p>
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            ` : ''}
                            
                            <!-- Form Balas (Khusus Seller Toko Ini) -->
                            ${isSeller ? `
                                <div style="margin-top: 12px; padding-left: 16px; border-left: 3px dashed var(--mario-blue);">
                                    <div style="display: flex; gap: 8px;">
                                        <textarea id="reply-input-${disc.id}" class="form-textarea" placeholder="Tulis jawaban sebagai Seller..." style="flex-grow: 1; min-height: 40px; padding: 6px 10px; font-size: 0.8rem; border: 2px solid var(--retro-dark); border-radius: 4px; outline: none; background-color: white; resize: vertical;" onkeydown="if(event.key==='Enter'&&!event.shiftKey){ event.preventDefault(); handleSendReply('${disc.id}'); }"></textarea>
                                        <button class="btn-retro btn-green" onclick="handleSendReply('${disc.id}')" style="padding: 6px 12px; font-size: 0.75rem;">Balas 💬</button>
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
                
                html += `</div>`;
            }

            // Tampilkan Form Kirim Pertanyaan Baru (hanya untuk buyer yang login, dan bukan seller dari barang ini)
            if (currentUserId) {
                if (isSeller) {
                    html += `
                        <div style="background-color: #EFF6FF; border: 2px solid var(--mario-blue); border-radius: 6px; padding: 12px; text-align: center; font-size: 0.8rem; color: var(--mario-blue); font-weight: bold;">
                            📢 Anda adalah Penjual mainan ini. Harap jawab pertanyaan calon pembeli pada utas di atas.
                        </div>
                    `;
                } else {
                    html += `
                        <div style="border: 2px solid var(--retro-dark); border-radius: 6px; box-shadow: 4px 4px 0px var(--retro-dark); background-color: #F8FAFC; padding: 16px; margin-top: 20px;">
                            <h4 style="font-family: var(--font-retro); font-size: 0.95rem; margin-bottom: 8px;">Tanyakan sesuatu tentang produk ini 🙋‍♂️</h4>
                            <div style="display: flex; flex-direction: column; gap: 10px;">
                                <textarea id="question-input" class="form-textarea" placeholder="Tanyakan kelengkapan, detail minus, foto tambahan, atau durasi pengiriman..." style="width: 100%; min-height: 70px; padding: 10px; font-size: 0.85rem; border: 2px solid var(--retro-dark); border-radius: 4px; outline: none; background-color: white; resize: vertical;"></textarea>
                                <button class="btn-retro btn-blue" onclick="handleSendQuestion()" style="align-self: flex-start;">Kirim Pertanyaan 💬</button>
                            </div>
                        </div>
                    `;
                }
            } else {
                html += `
                    <div style="background-color: #FFFBEB; border: 2px solid var(--mario-yellow); border-radius: 6px; padding: 12px; text-align: center; font-size: 0.8rem; color: #B45309; font-weight: bold;">
                        🔑 Anda harus Login untuk dapat memulai diskusi atau bertanya kepada Penjual.
                    </div>
                `;
            }

            discContainer.innerHTML = html;
        }

        function handleSendQuestion() {
            const input = document.getElementById('question-input');
            if (!input || input.value.trim() === '') {
                showAlert("Pertanyaan Kosong ❌", "Mohon tuliskan pertanyaan Anda terlebih dahulu!");
                return;
            }

            const currentUserId = db.getCurrentUserId();
            if (!currentUserId) return;

            db.addDiscussionQuestion(productId, currentUserId, input.value.trim());
            showToast("Pertanyaan Terkirim 💬", "Pertanyaan Anda berhasil ditambahkan ke diskusi produk.", "success");
            
            input.value = '';
            renderDiscussions();
        }

        function handleSendReply(discussionId) {
            const input = document.getElementById(`reply-input-${discussionId}`);
            if (!input || input.value.trim() === '') {
                showAlert("Jawaban Kosong ❌", "Mohon tuliskan jawaban atau balasan Anda!");
                return;
            }

            const currentUserId = db.getCurrentUserId();
            if (!currentUserId) return;

            db.addDiscussionReply(discussionId, currentUserId, input.value.trim());
            showToast("Balasan Terkirim 💬", "Jawaban Anda berhasil ditambahkan ke dalam utas diskusi.", "success");
            
            input.value = '';
            renderDiscussions();
        }

        function handleShareLink() {
            const cleanUrl = new URL(window.location.href);
            cleanUrl.searchParams.delete('preview');
            
            navigator.clipboard.writeText(cleanUrl.toString()).then(() => {
                showToast("Link Disalin 🔗", "Link produk bersih berhasil disalin ke clipboard!", "success");
            }).catch(err => {
                const textArea = document.createElement("textarea");
                textArea.value = cleanUrl.toString();
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast("Link Disalin 🔗", "Link produk bersih berhasil disalin!", "success");
                } catch (err) {
                    showToast("Gagal Menyalin ❌", "Tidak dapat menyalin link.", "error");
                }
                document.body.removeChild(textArea);
            });
        }

        // Hide headers/footers in preview mode
        if (urlParams.get('preview') === 'true') {
            const header = document.querySelector('header');
            if (header) header.style.display = 'none';
            const backLink = document.querySelector('.back-link');
            if (backLink) backLink.style.display = 'none';
            const footer = document.querySelector('footer');
            if (footer) footer.style.display = 'none';
            const container = document.querySelector('.container');
            if (container) container.style.paddingTop = '10px';
        }

        // Jalankan render awal saat halaman dimuat
        syncLoginDropdown();
        renderProductDetail();

        // ── REALTIME: bid & status produk langsung update ───────────
        window.addEventListener('retrohub_bid_received', (e) => {
            const urlParams = new URLSearchParams(window.location.search);
            const currentProductId = urlParams.get('id');
            if (e.detail && e.detail.product_id === currentProductId) {
                const bids = db.getBidsByProductId(currentProductId);
                renderBids(bids);
            }
        });
        window.addEventListener('retrohub_product_updated', (e) => {
            const urlParams = new URLSearchParams(window.location.search);
            const currentProductId = urlParams.get('id');
            if (e.detail && e.detail.id === currentProductId) {
                renderProductDetail();
            }
        });
        window.addEventListener('retrohub_order_updated', () => {
            renderProductDetail();
        });
        window.addEventListener('retrohub_sync_complete', () => {
            renderProductDetail();
        });
    </script>
</body>
</html>
